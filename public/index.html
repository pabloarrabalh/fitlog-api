<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitlog</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-brand">
        <h1>Fitlog</h1>
        <p id="sessionText">Sin sesión iniciada.</p>
      </div>

      <nav class="topbar-actions" aria-label="Autenticación y acciones">
        <button id="sessionBtn" type="button">Login</button>
        <button id="completeProfileBtn" type="button" class="hidden secondary">Completar perfil</button>
        <button id="createExerciseBtn" type="button" class="hidden secondary">Crear ejercicio</button>
        <button id="adminPanelBtn" type="button" class="hidden secondary">Pendientes</button>
      </nav>
    </header>

    <main class="app">
      <div class="actions">
        <button id="listBtn" type="button">Listar ejercicios</button>
      </div>

      <section class="panel">
        <h2>Ejercicios</h2>
        <div id="exerciseList" class="exercise-list">
          <p class="muted">Pulsa “Listar ejercicios”.</p>
        </div>
      </section>

      <p id="message" class="message"></p>
    </main>

    <section id="adminPanel" class="panel hidden admin-panel">
      <div class="panel-header">
        <h2>Ejercicios pendientes</h2>
        <button id="refreshPendingBtn" type="button">Actualizar</button>
      </div>
      <div id="pendingList" class="exercise-list">
        <p class="muted">Pulsa “Pendientes” para ver la cola de revisión.</p>
      </div>
    </section>

    <div id="authModal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <div class="modal-header">
          <div>
            <p class="modal-eyebrow">Fitlog</p>
            <h2 id="authTitle">Iniciar sesión</h2>
          </div>
          <button id="closeModalBtn" type="button" class="icon-button" aria-label="Cerrar modal">×</button>
        </div>

        <div class="tabs" role="tablist" aria-label="Autenticación">
          <button id="loginTab" type="button" class="tab active" role="tab" aria-selected="true">Login</button>
          <button id="registerTab" type="button" class="tab" role="tab" aria-selected="false">Registro</button>
        </div>

        <form id="loginForm" class="form-panel">
          <label>
            Usuario o email
            <input name="email" autocomplete="username" placeholder="admin" required />
          </label>
          <label>
            Contraseña
            <input name="password" type="password" autocomplete="current-password" placeholder="admin" required />
          </label>
          <button type="submit">Entrar</button>
        </form>

        <form id="registerForm" class="form-panel hidden">
          <div class="two-cols">
            <label>
              Nombre
              <input name="firstName" placeholder="Pablo" required />
            </label>
            <label>
              Apellidos
              <input name="lastName" placeholder="Gómez" required />
            </label>
          </div>
          <label>
            Usuario opcional
            <input name="username" placeholder="pablo2" />
          </label>
          <label>
            Email
            <input name="email" type="email" placeholder="pablo@correo.com" required />
          </label>
          <label>
            Contraseña
            <input name="password" type="password" placeholder="mínimo 8 caracteres" required />
          </label>
          <button type="submit">Crear cuenta</button>
        </form>
      </section>
    </div>

    <div id="createModal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-create-modal></div>
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="createTitle">
        <div class="modal-header">
          <div>
            <p class="modal-eyebrow">Fitlog</p>
            <h2 id="createTitle">Crear ejercicio</h2>
          </div>
          <button id="closeCreateModalBtn" type="button" class="icon-button" aria-label="Cerrar modal">×</button>
        </div>

        <form id="createExerciseForm" class="form-panel">
          <label>
            Nombre
            <input name="name" placeholder="Press banca plano" required />
          </label>
          <label>
            Descripción
            <input name="description" placeholder="Descripción breve" />
          </label>
          <div class="two-cols">
            <label>
              Músculos principales
              <input name="primaryMuscles" placeholder="chest, triceps" required />
            </label>
            <label>
              Músculos secundarios
              <input name="secondaryMuscles" placeholder="front delts, triceps" />
            </label>
          </div>
          <div class="two-cols">
            <label>
              Equipamiento
              <select name="equipment">
                <option value="barbell">Barra</option>
                <option value="dumbbell">Mancuerna</option>
                <option value="machine">Máquina</option>
                <option value="cable">Polea</option>
                <option value="bodyweight">Peso corporal</option>
                <option value="kettlebell">Kettlebell</option>
                <option value="other">Otro</option>
              </select>
            </label>
            <label>
              Patrón
              <select name="movementPattern">
                <option value="push">Push</option>
                <option value="pull">Pull</option>
                <option value="squat">Squat</option>
                <option value="hinge">Hinge</option>
                <option value="carry">Carry</option>
                <option value="core">Core</option>
                <option value="other">Otro</option>
              </select>
            </label>
          </div>
          <div class="two-cols">
            <label>
              Dificultad
              <select name="difficulty">
                <option value="easy">Fácil</option>
                <option value="moderate" selected>Media</option>
                <option value="hard">Difícil</option>
              </select>
            </label>
            <label>
              Visibilidad
              <select name="visibility">
                <option value="public" selected>Pública</option>
                <option value="private">Privada</option>
              </select>
            </label>
          </div>
          <button type="submit">Guardar ejercicio</button>
        </form>
      </section>
    </div>

    <div id="profileModal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-profile-modal></div>
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="profileTitle">
        <div class="modal-header">
          <div>
            <p class="modal-eyebrow">Fitlog</p>
            <h2 id="profileTitle">Completar perfil</h2>
          </div>
          <button id="closeProfileModalBtn" type="button" class="icon-button" aria-label="Cerrar modal">×</button>
        </div>

        <form id="profileForm" class="form-panel">
          <label>
            Peso corporal (kg)
            <input name="bodyWeightKg" type="number" min="30" max="250" step="0.1" placeholder="70" />
          </label>
          <div class="two-cols">
            <label>
              Experiencia
              <select name="experience">
                <option value="beginner">Principiante</option>
                <option value="intermediate">Intermedio</option>
                <option value="advanced">Avanzado</option>
              </select>
            </label>
            <label>
              Objetivo
              <select name="objective">
                <option value="strength">Fuerza</option>
                <option value="hypertrophy" selected>Hipertrofia</option>
                <option value="endurance">Resistencia</option>
                <option value="recomposition">Recomposición</option>
              </select>
            </label>
          </div>
          <button type="submit">Guardar perfil</button>
        </form>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
